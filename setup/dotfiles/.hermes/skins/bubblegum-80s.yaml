name: bubblegum-80s
description: Totally radical 1980s bubblegum-inspired theme with bright pastels and neon accents

colors:
  banner_border: "#FF69B4"
  banner_title: "#00D4FF"
  banner_accent: "#FFFF00"
  banner_dim: "#BF00FF"
  banner_text: "#FFFFFF"
  ui_accent: "#FF69B4"
  ui_label: "#4DA6FF"
  ui_ok: "#4CAF50"
  ui_error: "#EF5350"
  ui_warn: "#FFA726"
  prompt: "#FFF8DC"
  input_rule: "#FF69B4"
  response_border: "#00D4FF"
  session_label: "#FF69B4"
  session_border: "#BF00FF"

spinner:
  waiting_faces:
    - "(★)"
    - "(♪)"
    - "(◆)"
    - "(▲)"
    - "(●)"
  thinking_faces:
    - "(★)"
    - "(♪)"
    - "(◆)"
    - "(⌁)"
    - "(▲)"
  thinking_verbs:
    - "rewinding"
    - "mixing"
    - "jamming"
    - "grooving"
    - "rocking out"
    - "dropping the beat"
    - "cranking it up"
    - "hitting play"
  wings:
    - ["⟪★", "★⟫"]
    - ["⟪♪", "♪⟫"]
    - ["⟪◆", "◆⟫"]
    - ["⟪▲", "▲⟫"]

branding:
  agent_name: "Bubblegum Agent"
  welcome: "Hey dude! Ready to shred some tasks? Type your message or /help for commands!"
  goodbye: "Later, dude! See you on the flip side! ★"
  response_label: " ★ Bubblegum "
  prompt_symbol: "★ ❯ "
  help_header: "(★) Radical Commands"

tool_prefix: "┊"

tool_emojis:
  terminal: "⚔"
  web_search: "◎"
  read_file: "◇"
  write_file: "◆"
  search_files: "▷"
  execute_code: "⌁"
  browser_navigate: "◈"
  delegate_task: "▣"
  mixture_of_agents: "⚗"
  memory: "◐"
  clarify: "?"
  cronjob: "↻"
  process: "⚙"
  todo: "☐"

