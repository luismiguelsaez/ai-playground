# ====================================================================
# fzf - Fuzzy finder (from GitHub releases)
# ====================================================================

- name: Get fzf latest release version
  uri:
    url: https://api.github.com/repos/junegunn/fzf/releases/latest
    return_content: true
  register: fzf_release
  changed_when: false
  when: ai_server_install_zsh and ('fzf' in zsh_plugins)

- name: Set fzf archive name (x86_64)
  set_fact:
    fzf_archive: "fzf-{{ fzf_release.json.tag_name }}-linux_amd64.tar.gz"
  when:
    - ai_server_install_zsh
    - ('fzf' in zsh_plugins)
    - ansible_architecture is match('.*64')

- name: Set fzf archive name (aarch64)
  set_fact:
    fzf_archive: "fzf-{{ fzf_release.json.tag_name }}-linux_arm64.tar.gz"
  when:
    - ai_server_install_zsh
    - ('fzf' in zsh_plugins)
    - ansible_architecture is match('aarch64')

- name: Download fzf binary
  get_url:
    url: "https://github.com/junegunn/fzf/releases/download/{{ fzf_release.json.tag_name }}/{{ fzf_archive }}"
    dest: "/tmp/fzf-{{ fzf_release.json.tag_name }}.tar.gz"
    mode: '0644'
  when:
    - ai_server_install_zsh
    - ('fzf' in zsh_plugins)
    - fzf_archive is defined

- name: Extract fzf archive
  unarchive:
    src: "/tmp/fzf-{{ fzf_release.json.tag_name }}.tar.gz"
    dest: /tmp/
    remote_src: true
  register: fzf_extract
  when:
    - ai_server_install_zsh
    - ('fzf' in zsh_plugins)

- name: Install fzf binary to /usr/local/bin
  copy:
    src: "{{ fzf_extract.files[0].split('/')[0] }}/fzf"
    remote_src: true
    dest: /usr/local/bin/fzf
    mode: '0755'
  become: true
  when:
    - ai_server_install_zsh
    - ('fzf' in zsh_plugins)

- name: Run fzf install script (key bindings, completion)
  command: "/usr/local/bin/fzf/install --all --no-update-rc --no-zsh"
  become_user: "{{ zsh_user }}"
  become: true
  args:
    creates: "{{ ansible_env.HOME | default('/home/' ~ zsh_user) }}/.fzf"
  when:
    - ai_server_install_zsh
    - ('fzf' in zsh_plugins)

- name: Copy zshrc to user home
  template:
    src: .zshrc.j2
    dest: "{{ ansible_env.HOME | default('/home/' ~ zsh_user) }}/.zshrc"
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user }}"
    mode: '0644'
  become: true
  when: ai_server_install_zsh
