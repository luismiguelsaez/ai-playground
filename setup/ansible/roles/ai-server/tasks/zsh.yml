---
# Zsh configuration tasks

- name: Check if user exists
  getent:
    database: passwd
    key: "{{ zsh_user }}"
  become: true
  changed_when: false
  when: ai_server_install_zsh

- name: Create Oh My Zsh custom directory
  file:
    path: "{{ ansible_env.HOME | default('/home/' ~ zsh_user) }}/.oh-my-zsh/custom"
    state: directory
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user }}"
    mode: '0755'
  become: true
  when: ai_server_install_zsh

- name: Install Oh My Zsh (unattended)
  command: >-
    curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
    | bash -s -- --unattended
  args:
    creates: "{{ ansible_env.HOME | default('/home/' ~ zsh_user) }}/.oh-my-zsh/oh-my-zsh.sh"
  environment:
    ZSH: "{{ ansible_env.HOME | default('/home/' ~ zsh_user) }}/.oh-my-zsh"
  become: true
  become_user: "{{ zsh_user }}"
  when: ai_server_install_zsh

- name: Install zsh-autosuggestions plugin
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ ansible_env.HOME | default('/home/' ~ zsh_user) }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    force: true
  become: true
  become_user: "{{ zsh_user }}"
  creates: "{{ ansible_env.HOME | default('/home/' ~ zsh_user) }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
  when: ai_server_install_zsh and ('zsh-autosuggestions' in zsh_plugins)

# ====================================================================
# bat - Modern cat replacement (from GitHub releases)
# ====================================================================

- name: Get bat latest release version
  uri:
    url: https://api.github.com/repos/sharkdp/bat/releases/latest
    return_content: true
  register: bat_release
  changed_when: false
  when: ai_server_install_zsh and ('cat' in zsh_aliases)

- name: Set bat archive name (x86_64)
  set_fact:
    bat_archive: "bat-v{{ bat_release.json.tag_name }}-x86_64-unknown-linux-gnu.tar.gz"
  when:
    - ai_server_install_zsh
    - ('cat' in zsh_aliases)
    - ansible_architecture is match('.*64')

- name: Set bat archive name (aarch64)
  set_fact:
    bat_archive: "bat-v{{ bat_release.json.tag_name }}-aarch64-unknown-linux-gnu.tar.gz"
  when:
    - ai_server_install_zsh
    - ('cat' in zsh_aliases)
    - ansible_architecture is match('aarch64')

- name: Download bat binary
  get_url:
    url: "https://github.com/sharkdp/bat/releases/download/v{{ bat_release.json.tag_name }}/{{ bat_archive }}"
    dest: "/tmp/bat-{{ bat_release.json.tag_name }}.tar.gz"
    mode: '0644'
  when:
    - ai_server_install_zsh
    - ('cat' in zsh_aliases)
    - bat_archive is defined

- name: Extract bat archive
  unarchive:
    src: "/tmp/bat-{{ bat_release.json.tag_name }}.tar.gz"
    dest: /tmp/
    remote_src: true
  register: bat_extract
  when:
    - ai_server_install_zsh
    - ('cat' in zsh_aliases)

- name: Install bat binary to /usr/local/bin
  copy:
    src: "{{ bat_extract.files[0].split('/')[0] }}/bat"
    remote_src: true
    dest: /usr/local/bin/bat
    mode: '0755'
  become: true
  when:
    - ai_server_install_zsh
    - ('cat' in zsh_aliases)

- name: Install bat man page
  copy:
    src: "{{ bat_extract.files[0].split('/')[0] }}/man/man1/bat.1"
    dest: /usr/local/share/man/man1/bat.1
    remote_src: true
    mode: '0644'
  become: true
  when:
    - ai_server_install_zsh
    - ('cat' in zsh_aliases)

- name: Install bat completions
  copy:
    src: "{{ bat_extract.files[0].split('/')[0] }}/shell/"
    dest: /usr/local/share/bash-completion/completions/
    remote_src: true
  become: true
  when:
    - ai_server_install_zsh
    - ('cat' in zsh_aliases)

# ====================================================================
# eza - Modern ls replacement (from GitHub releases)
# ====================================================================

- name: Get eza latest release version
  uri:
    url: https://api.github.com/repos/eza-community/eza/releases/latest
    return_content: true
  register: eza_release
  changed_when: false
  when: ai_server_install_zsh and ('eza' in zsh_plugins)

- name: Determine eza asset name for architecture
  set_fact:
    eza_asset: "{{ item.name }}"
  loop: "{{ eza_release.json.assets }}"
  when:
    - ai_server_install_zsh
    - ('eza' in zsh_plugins)
    - >-
      ((ansible_architecture is match('.*64') and item.name | regex_search('x86_64-unknown-linux-gnu')) or
       (ansible_architecture is match('aarch64') and item.name | regex_search('aarch64-unknown-linux-gnu')))
  register: eza_asset_match

- name: Download eza binary
  get_url:
    url: "https://github.com/eza-community/eza/releases/latest/download/{{ eza_asset_match.results[0].item }}"
    dest: "/tmp/eza-{{ eza_release.json.tag_name }}.tar.gz"
    mode: '0644'
    headers:
      Accept: "application/octet-stream"
  when:
    - ai_server_install_zsh
    - ('eza' in zsh_plugins)
    - eza_asset_match is defined
    - eza_asset_match.results | length > 0

- name: Extract eza archive
  unarchive:
    src: "/tmp/eza-{{ eza_release.json.tag_name }}.tar.gz"
    dest: /tmp/
    remote_src: true
  register: eza_extract
  when:
    - ai_server_install_zsh
    - ('eza' in zsh_plugins)

- name: Install eza binary to /usr/local/bin
  copy:
    src: "{{ eza_extract.files[0].split('/')[0] }}/eza"
    remote_src: true
    dest: /usr/local/bin/eza
    mode: '0755'
  become: true
  when:
    - ai_server_install_zsh
    - ('eza' in zsh_plugins)

