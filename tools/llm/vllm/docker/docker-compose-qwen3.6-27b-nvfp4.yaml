---

# - VRAM Usage: 50Gi ( startup )
# - Speculative config
#   - MTP:    --speculative-config '{"method":"mtp","num_speculative_tokens":1}'
#   - DFlash: --speculative-config '{"method": "dflash", "model": "z-lab/Qwen3.6-27B-DFlash", "num_speculative_tokens": 15}'

services:
  ## OpenWebUI
  vllm-open-webui-qwen3.5-27b:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - 3001:8080
    environment:
      - OPENAI_API_BASE_URL=http://vllm-qwen3.6-27b:8000/v1
    restart: unless-stopped

  vllm-qwen3.6-27b:
    ipc: host
    shm_size: 32g
    image: vllm/vllm-openai:v0.20.1
    command: >
      AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-NVFP4
      --served-model-name Qwen3.6-27B
      --tensor-parallel-size 1
      --quantization compressed-tensors
      --dtype auto
      --max-model-len 262144
      --max-num-seqs 64
      --max-num-batched-tokens 16384
      --gpu-memory-utilization 0.85
      --enable-chunked-prefill
      --no-enable-prefix-caching
      --load-format safetensors
      --trust-remote-code
      --attention-backend flash_attn
      --mm-encoder-tp-mode data
      --mm-processor-cache-type shm
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/.cache/vllm:/root/.cache/vllm
      - $PWD/config/models:/configs
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]
    environment:
      - TORCH_CUDA_ARCH_LIST=12.0+PTX
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_USE_FLASHINFER_MOE_FP4=0

