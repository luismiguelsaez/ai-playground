---

services:
  vllm:
    image: vllm/vllm-openai:v0.19.1
    command: >
      RedHatAI/gemma-4-31B-it-NVFP4
      --attention-backend flash_attn
      --max-model-len 262144
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --gpu-memory-utilization 0.5
      --served-model-name gemma-4-31B-it-NVFP4
      --speculative-config '{"method": "dflash", "model": "RedHatAI/gemma-4-31B-it-speculator.dflash", "num_speculative_tokens": 8}'
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/.cache/vllm:/root/.cache/vllm
      - $PWD/config/models:/configs
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]
    environment:
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1

