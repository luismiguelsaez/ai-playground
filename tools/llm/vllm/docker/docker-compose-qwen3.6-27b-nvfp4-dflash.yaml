---

# - VRAM Usage: 50Gi ( startup )
# - Speculative config
#   - MTP:    --speculative-config '{"method":"mtp","num_speculative_tokens":1}'
#   - DFlash: --speculative-config '{"method": "dflash", "model": "z-lab/Qwen3.6-27B-DFlash", "num_speculative_tokens": 15}'

services:
  vllm:
    image: vllm/vllm-openai:nightly
    command: >
      sakamakismile/Qwen3.6-27B-NVFP4
      --max-model-len 262144
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --gpu-memory-utilization 0.9
      --served-model-name Qwen3.6-27B-DFlash
      --max-num-batched-tokens 512 
      --max-num-seqs 2
      --speculative-config '{"method": "dflash", "model": "z-lab/Qwen3.6-27B-DFlash", "num_speculative_tokens": 15}'
      --override-generation-config '{"thinking":{"type":"disabled"}, "temperature": 0.6, "top_p": 0.95, "top_k": 20, "min_p": 0.0, "repetition_penalty": 1.0, "presence_penalty": 0.0}'
      --default-chat-template-kwargs '{"enable_thinking": true, "preserve_thinking": true}'
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/.cache/vllm:/root/.cache/vllm
      - $PWD/config/models:/configs
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]
    environment:
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1

