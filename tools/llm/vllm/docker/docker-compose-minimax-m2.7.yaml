services:
  # Minimax M2.7
  # Size: 229B - 10B active
  # HF:
  #   - https://huggingface.co/lukealonso/MiniMax-M2.7-NVFP4
  # GPU(s): 2 x RTX 6000 Pro
  # VRAM: 2 x 91.793Gi
  vllm-minimax-m2.7:
    image: vllm/vllm-openai:v0.19.0
    pull_policy: always
    ipc: host
    shm_size: 32g
    command: >
      lukealonso/MiniMax-M2.7-NVFP4
      --port 8000
      --served-model-name MiniMax-M2.7-NVFP4
      --trust-remote-code
      --dtype bfloat16
      --quantization modelopt_fp4
      --max-model-len 191000 
      --kv-cache-dtype fp8
      --enable_expert_parallel
      --tensor-parallel-size 2
      --enable-auto-tool-choice
      --tool-call-parser minimax_m2
      --reasoning-parser minimax_m2_append_think
      --disable-custom-all-reduce
      --kv-cache-dtype fp8
      --enable-chunked-prefill
      --max-num-seqs 4
      --max-num-batched-tokens 131072
      --gpu-memory-utilization 0.9556
      --moe-backend flashinfer_cutlass
      --compilation-config '{"cudagraph_mode":"PIECEWISE","cudagraph_num_of_warmups":1}'
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/.cache/flashinfer:/root/.cache/flashinfer
      - $HOME/github/ai-playground/tools/llm/vllm/source/config:/config
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0","1"]
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      - SAFETENSORS_FAST_GPU=1
      - NCCL_P2P_DISABLE=1
      - NCCL_DEBUG=INFO
      - NCCL_IB_DISABLE=1
      - NCCL_NVLS_ENABLE=0
      - VLLM_LOGGING_LEVEL=INFO
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_NVFP4_GEMM_BACKEND=cutlass
      - FLASHINFER_JIT_CACHE=/root/.cache/flashinfer  # persist JIT cache
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - OMP_NUM_THREADS=8
    restart: unless-stopped

