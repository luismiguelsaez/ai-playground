---

# Usage VRAM: 2 x 20.897Gi

services:
  vllm-ui:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - 3001:8080
    environment:
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:v0.18.1
    command: >
      QuantTrio/Qwen3.5-27B-AWQ
      --port 8000
      --served-model-name model
      --tensor-parallel-size 2
      --max-model-len 262144
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --gpu-memory-utilization 0.9
      --max-num-seqs 4
      --max-num-batched-tokens 512
      --override-generation-config '{"thinking":{"type":"disabled"}, "temperature": 0.6, "top_p": 0.95, "top_k": 20, "min_p": 0.0, "repetition_penalty": 1.0, "presence_penalty": 0.0}'
      --speculative-config '{"method":"mtp","num_speculative_tokens":2}'
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $PWD/config/models:/configs
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0","1"]
    environment:
      - NCCL_P2P_DISABLE=1
      - NCCL_SHM_DISABLE=0
      - NCCL_SOCKET_IFNAME=lo
      - NCCL_IB_DISABLE=1
      - SAFETENSORS_FAST_GPU=1
      - OMP_NUM_THREADS=4
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1

