---

# Qwen 3.5 27b
# - HF: unsloth/Qwen3.5-27B-GGUF:Q4_K_M
# - GPU(s): 1 x RTX 3090
# - VRAM Usage: 
# - Context: 262144
#
# - HF: unsloth/Qwen3.5-27B-GGUF:UD-Q6_K_XL
# - GPU(s): 2 x RTX 3090
# - VRAM Usage: 
# - Context: 262144

services:

  agent-qwen3.5:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b8148
    runtime: nvidia
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LLAMA_CACHE=/root/.cache/llama.cpp
    ports:
      - "8002:8000"
    volumes:
      - ~/.cache/huggingface/hub:/root/.cache/llama.cpp
    command: >
      --hf-repo unsloth/Qwen3.5-27B-GGUF:Q4_K_M
      --alias coding-agent
      --host 0.0.0.0
      --port 8000
      -ngl 99
      -c 262144
      -np 1
      --jinja
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      --temp 0.6
      --top-p 0.95
      --min-p 0.0
      --top-k 20
      --presence-penalty 0.0
      --repeat-penalty 1.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    restart: unless-stopped

