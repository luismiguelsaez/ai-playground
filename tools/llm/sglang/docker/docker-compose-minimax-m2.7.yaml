---

# OS configuration
# - NCCL stuck issue: add `iommu=pt` to Kernel parameters at `/etc/default/grub`
#
# Models
#
# NVIDIA ( https://huggingface.co/nvidia/MiniMax-M2.7-NVFP4 )
# - VRAM Usage:  91.876Gi ( startup )
#   - K size: 8.76 GB, V size: 8.76 GB ( per GPU )

services:

  ## OpenWebUI
  sglang-open-webui-minimax-m2.7:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - 3001:8080
    environment:
      - OPENAI_API_BASE_URL=http://sglang-minimax-m2.7:30000/v1
    restart: unless-stopped

  ## SGLang

  # lukealonso/MiniMax-M2.7-NVFP4
  #   - GPUs: 2 x RTX 6000 Pro
  #   - VRAM usage: 85.368Gi +  85.368Gi
  #   - Generation speed:
  sglang-minimax-m2.7:
    #image: lmsysorg/sglang:v0.5.10-cu130
    image: voipmonitor/sglang:cu130
    pull_policy: always
    ipc: host
    shm_size: 32g
    command: >
      sglang serve
      --host 0.0.0.0
      --port 30000
      --model-path nvidia/MiniMax-M2.7-NVFP4
      --served-model-name MiniMax-M2.7-NVFP4
      --context-length 191000
      --reasoning-parser minimax
      --tool-call-parser minimax-m2
      --tensor-parallel-size 2
      --trust-remote-code
      --kv-cache-dtype fp8_e4m3
      --quantization modelopt_fp4
      --moe-runner-backend flashinfer_cutlass 
      --attention-backend flashinfer
      --mem-fraction-static 0.93
      --max-running-requests 4
    ports:
      - "30000:30000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/.cache/sglang:/root/.cache/sglang
      - $HOME/.cache/flashinfer:/root/.cache/flashinfer
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0","1"]
    environment:
      - OMP_NUM_THREADS=16
      - SGLANG_ENABLE_SPEC_V2=True
    restart: unless-stopped

