services:
    minimax:
      image: voipmonitor/sglang:cu130
      container_name: minimax-m2
      shm_size: 32g
      ipc: host
      cap_add:
        - SYS_PTRACE
        - IPC_LOCK
      ulimits:
        memlock: -1
        stack: 67108864
      ports:
        - "8080:5000"
      volumes:
        - $HOME/.cache/huggingface:/root/.cache/huggingface
        - $HOME/.cache/sglang:/root/.cache/sglang
        - $HOME/.cache/flashinfer:/root/.cache/flashinfer
      environment:
        - OMP_NUM_THREADS=16
        - SGLANG_ENABLE_SPEC_V2=True
        - SGLANG_USE_PYNCCL=0
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                device_ids: ["0", "1"]
                capabilities: [gpu]
      command: >
        python -m sglang.launch_server
        --model-path lukealonso/MiniMax-M2.7-NVFP4
        --served-model-name minimax-m2 
        --reasoning-parser minimax
        --tool-call-parser minimax-m2
        --tp 2
        --enable-torch-compile
        --trust-remote-code
        --kv-cache-dtype fp8_e4m3
        --quantization modelopt_fp4
        --moe-runner-backend b12x
        --fp4-gemm-backend b12x
        --attention-backend flashinfer
        --enable-pcie-oneshot-allreduce
        --mem-fraction-static 0.95
        --host 0.0.0.0 --port 5000
        --context-length 180000
        --cuda-graph-max-bs 16
        --max-running-requests 64

