---

services:

  openclaw:
    # docker compose exec openclaw openclaw config set models.providers.vllm.baseUrl "http://llm:8000/v1"
    # docker compose exec openclaw openclaw config set models.providers.vllm.apiKey "vllm-local"
    # docker compose exec openclaw openclaw config set models.providers.vllm.api "openai-completions"
    # docker compose exec openclaw openclaw config set models.providers.custom-llm-8000.models.0.contextWindow 131072
    # docker compose exec openclaw openclaw config set agents.defaults.model.primary "model"
    # docker compose exec openclaw openclaw gateway restart
    # docker compose exec openclaw openclaw models status --probe
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      - "18789:18789"
      - "18791:18791"
    #volumes:
    #  - ${PWD}/openclaw.json:/home/node/.openclaw/openclaw.json:rw
    restart: unless-stopped
    networks:
      - openclaw

  llm:
    image: vllm/vllm-openai:v0.17.1-cu130
    pull_policy: always
    command: >
      --model cyankiwi/Qwen3.5-27B-AWQ-4bit
      --port 8000
      --served-model-name model
      --max-model-len 262144
      --language-model-only
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.95
      --max-num-seqs 2
      --max-num-batched-tokens 512
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/github/ai-playground/tools/llm/vllm/source/config:/config
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]
    environment: []
    networks:
      - openclaw

networks:
  openclaw:
    driver: bridge

volumes:
  openclaw:
