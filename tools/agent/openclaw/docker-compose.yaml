---

# Models
# - unsloth/Qwen3.5-122B-A10B-GGUF:IQ4_XS - 4 GPUs
# - unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M - 1GPU
# - unsloth/Qwen3.5-35B-A3B-GGUF:Q6_K - 2GPU

services:

  openclaw:
    #image: alpine/openclaw:2026.3.13-1-slim
    image: ghcr.io/openclaw/openclaw:latest
    #volumes:
    #  - openclaw:
    ports:
      - "18789:18789"
      - "18791:18791"
    networks:
      - openclaw

  llm:
    image: vllm/vllm-openai:nightly
    pull_policy: always
    command: >
      --model cyankiwi/Qwen3.5-27B-AWQ-4bit
      --port 8000
      --served-model-name model
      --max-model-len 262144
      --language-model-only
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.93
      --max-num-seqs 2
      --max-num-batched-tokens 512
      --default-chat-template-kwargs '{"enable_thinking": false}'
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/github/ai-playground/tools/llm/vllm/source/config:/config
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]
    environment: []
    restart: always
    networks:
      - openclaw

networks:
  openclaw:
    driver: bridge

volumes:
  openclaw:
